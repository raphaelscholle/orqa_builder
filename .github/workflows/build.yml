name: Build Yocto Deb Packages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "kas/**"
      - "meta-orqa-builder/**"
      - "scripts/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      board:
        description: ORQA board
        required: true
        default: standalone
        type: choice
        options:
          - apb
          - avp
          - evk
          - standalone
      target_set:
        description: Which package group to build
        required: true
        default: openhd-stack
        type: choice
        options:
          - openhd-stack
          - kernel
          - all

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      BOARD: ${{ github.event_name == 'workflow_dispatch' && inputs.board || 'standalone' }}
      TARGET_SET: ${{ github.event_name == 'workflow_dispatch' && inputs.target_set || 'openhd-stack' }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          docker system prune -af || true
          df -h

      - name: Install host dependencies
        run: ./scripts/install-host-deps.sh

      - name: Install kas
        run: |
          python3 -m pip install --user kas
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Resolve OpenHD revisions
        run: ./scripts/resolve-openhd-revisions.sh

      - name: Restore cache seed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/download-cache-seed.sh "${{ env.BOARD }}"

      - name: Restore downloads cache
        id: cache-downloads-restore
        uses: actions/cache/restore@v4
        with:
          path: build/${{ env.BOARD }}/downloads
          key: ${{ runner.os }}-downloads-${{ env.BOARD }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-downloads-${{ env.BOARD }}-

      - name: Restore sstate cache
        id: cache-sstate-restore
        uses: actions/cache/restore@v4
        with:
          path: build/${{ env.BOARD }}/sstate-cache
          key: ${{ runner.os }}-sstate-${{ env.BOARD }}-${{ hashFiles('kas/**/*.yml', 'meta-orqa-builder/conf/**', 'meta-orqa-builder/recipes-openhd/**') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sstate-${{ env.BOARD }}-

      - name: Build package artifacts
        run: ./scripts/build-targets.sh "${{ env.BOARD }}" "${{ env.TARGET_SET }}"

      - name: Collect artifacts
        run: ./scripts/collect-artifacts.sh "${{ env.BOARD }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orqa-${{ env.BOARD }}-${{ env.TARGET_SET }}-deb-packages
          path: artifacts/${{ env.BOARD }}/
          if-no-files-found: error

      - name: Save downloads cache
        if: ${{ always() && steps.cache-downloads-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: build/${{ env.BOARD }}/downloads
          key: ${{ steps.cache-downloads-restore.outputs.cache-primary-key }}

      - name: Save sstate cache
        if: ${{ always() && steps.cache-sstate-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: build/${{ env.BOARD }}/sstate-cache
          key: ${{ steps.cache-sstate-restore.outputs.cache-primary-key }}
